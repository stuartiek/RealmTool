name: DrowsyManagementTool
version: ${project.version}
main: com.stuart.javarealmtool.JavaRealmTool
api-version: 1.21
commands:
  dmt:
    description: Main management command
    usage: /dmt help
  ticket:
    description: Ticket system
    usage: /ticket [new|list|view|close]
  tpa:
    description: Teleport request system
    usage: /tpa accept|deny <player>
  kit:
    description: Browse and claim kits
    usage: /kit
  bounty:
    description: Set or view bounties
    usage: /bounty [set <player> <amount>]
  hub:
    description: Teleport to the hub location
    usage: /hub
  shop:
    description: Player shop system
    usage: /shop [sell <item> <amount> <price>]
  quest:
    description: View and claim quests
    usage: /quest
  apply:
    description: Submit a staff application
    usage: /apply <message>
  vote:
    description: Vote on server polls
    usage: /vote <pollId> <option#>
  crate:
    description: Open crate menu
    usage: /crate
  nick:
    description: Set or reset your nickname
    usage: /nick [name]
  rules:
    description: View server rules
    usage: /rules
  duel:
    description: Challenge a player to a duel
    usage: /duel <player> [wager]
  pwarp:
    description: Player warp system
    usage: /pwarp [set|delete <name>]
  achievements:
    description: View your achievements
    usage: /achievements
  stats:
    description: View PvP stats
    usage: /stats [player]
  balance:
    description: Show your XP level and coin balance
    usage: /balance [player] [add|remove <amount>|reset]
  economy:
    description: Manage the server economy
    usage: /economy reset
  report:
    description: Report a player
    usage: /report <player> <reason>
  personal:
    description: Personal miner NPC controller
    usage: /personal npc spawn miner | /personal npc despawn miner | /personal npc miner collect
  staff:
    description: View online staff tags
    usage: /staff
permissions:
  dmt.admin:
    description: Allows use of admin tools
    default: op
  dmt.afk.exempt:
    description: Prevents player from being AFK kicked
    default: false
  webapp.access:
    description: Allows login to the web interface
    default: op
  webapp.*:
    description: Grants all webapp permissions
    default: op
