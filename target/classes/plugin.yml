name: DrowsyManagementTool
version: 6.0
main: com.stuart.javarealmtool.JavaRealmTool
api-version: 1.21
commands:
  dmt:
    description: Main management command
    permission: dmt.admin
    usage: /dmt help
  ticket:
    description: Submit a ticket
    usage: /ticket new <message>
  tpa:
    description: Teleport request system
    usage: /tpa accept|deny <player>
  kit:
    description: Browse and claim kits
    usage: /kit
  bounty:
    description: Set or view bounties
    usage: /bounty [set <player> <amount>]
  shop:
    description: Player shop system
    usage: /shop [sell <item> <amount> <price>]
  quest:
    description: View and claim quests
    usage: /quest
  apply:
    description: Submit a staff application
    usage: /apply <message>
  vote:
    description: Vote on server polls
    usage: /vote <pollId> <option#>
  crate:
    description: Open crate menu
    usage: /crate
permissions:
  dmt.admin:
    description: Allows use of admin tools
    default: op